<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Specialty espresso bar in Wilton Manors, FL. Italian heritage, South Florida soul.">
  <title>The Bean Espresso Bar — Wilton Manors, FL</title>

  <!-- Open Graph -->
  <meta property="og:title" content="The Bean Espresso Bar">
  <meta property="og:description" content="Italian heritage, South Florida soul. Espresso bar on Wilton Drive, Wilton Manors FL.">
  <meta property="og:image" content="The Bean OpenGraph.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="The Bean OpenGraph.jpg">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="TheBean-FavIcon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700&family=Bona+Nova:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/thin/style.css">

  <style>
    /* ─── RESET ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ─── TOKENS ───────────────────────────────────────── */
    :root {
      --color-bg:        #E7D1C9;
      --color-surface:   #FFF9F7;
      --color-text:      #241F1E;
      --color-footer-bg: #181514;
      --color-footer-fg: #E7D1C9;
      --color-accent:    #C29E90;
      --color-border:    #241F1E;

      --font-display: 'Hanken Grotesk', sans-serif;
      --font-heritage: 'Bona Nova', serif;

      --grid-max:    1160px;
      --grid-gutter: clamp(1.5rem, 5vw, 4rem);
    }

    /* ─── BASE ─────────────────────────────────────────── */
    html { scroll-behavior: smooth; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-heritage);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── CONTAINER ────────────────────────────────────── */
    .container {
      max-width: var(--grid-max);
      margin-inline: auto;
      padding-inline: var(--grid-gutter);
    }

    /* ─── FOCUS ────────────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ─── SCROLL REVEAL ────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease-out, transform 0.7s ease-out;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ──────────────────────────────────────────────────── */
    /* HERO                                                  */
    /* ──────────────────────────────────────────────────── */
    .hero {
      min-height: 100svh;
      background: linear-gradient(to bottom, #fff3ee, #e7d1c9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(4rem, 10vw, 8rem) var(--grid-gutter);
      gap: clamp(1.5rem, 3vw, 2.5rem);
      text-align: center;
    }

    .hero__symbol {
      width: clamp(120px, 20vw, 260px);
      height: auto;
    }

    .hero__wordmark {
      width: clamp(200px, 33vw, 478px);
      height: auto;
    }

    /* 40px / -1.6px tracking — Figma-exact. max-width mirrors Figma's 390px container */
    .hero__sub {
      font-family: var(--font-heritage);
      font-size: clamp(1.4rem, 2.78vw, 2.5rem);
      font-weight: 400;
      font-style: normal;
      color: var(--color-text);
      letter-spacing: -0.04em;
      line-height: 1.35;
      margin-top: clamp(1rem, 3vw, 2.5rem);
      max-width: 390px;
    }

    .hero__sub em {
      font-style: italic;
    }

    /* ──────────────────────────────────────────────────── */
    /* MENU SECTION                                          */
    /* ──────────────────────────────────────────────────── */
    .menu-section {
      background: var(--color-surface);
      padding: 81px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    /* "MENU" label — 56px, tight tracking, border-bottom only */
    .menu-heading {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.75rem, 3.9vw, 3.5rem);
      letter-spacing: -0.01em;
      color: var(--color-text);
      text-align: center;
      border-bottom: 10px solid var(--color-border);
      width: 100%;
      padding-bottom: 16px;
      line-height: 1;
    }

    /* Each drink — 80px, 0.2em tracking, fixed 72px row height */
    .menu-item {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2rem, 5.56vw, 5rem);
      letter-spacing: 0.2em;
      color: var(--color-text);
      text-align: center;
      border-bottom: 10px solid var(--color-border);
      width: 100%;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ──────────────────────────────────────────────────── */
    /* FOOTER                                                */
    /* ──────────────────────────────────────────────────── */
    .footer {
      background: var(--color-footer-bg);
      color: var(--color-footer-fg);
      min-height: 801px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 72px;
      padding: 24px 15px;
      flex-wrap: wrap;
    }

    /* 24px / -0.96px tracking / 204px wide — Figma-exact */
    .footer__tagline {
      font-family: var(--font-heritage);
      font-style: italic;
      font-weight: 400;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
      text-align: center;
      line-height: 1;
      color: var(--color-footer-fg);
      width: 204px;
    }

    .footer__logo {
      width: clamp(240px, 33vw, 478px);
      height: auto;
      flex-shrink: 0;
    }

    .footer__info {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      width: 204px;
    }

    .footer__info-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .footer__info-label {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-footer-fg);
      opacity: 0.55;
    }

    .footer__info-value {
      font-family: var(--font-heritage);
      font-style: italic;
      font-size: 0.95rem;
      letter-spacing: -0.02em;
      color: var(--color-footer-fg);
      line-height: 1.5;
    }

    .footer__info-value a {
      color: inherit;
      transition: opacity 0.15s ease-out;
    }

    .footer__info-value a:hover { opacity: 0.7; }

    /* ──────────────────────────────────────────────────── */
    /* RESPONSIVE                                            */
    /* ──────────────────────────────────────────────────── */
    @media (max-width: 599px) {
      :root {
        --grid-gutter: 1rem;
      }

      .hero {
        padding-inline: 1rem;
        gap: 0;
      }

      .hero__symbol {
        width: 72vw;
        margin-bottom: 1.5rem;
      }

      .hero__wordmark {
        width: 88vw;
        margin-bottom: 3.5rem;
      }

      .hero__sub {
        font-size: clamp(1.35rem, 5.5vw, 1.75rem);
      }

      .menu-section {
        padding-inline: 1rem;
      }

      .footer {
        flex-direction: column;
        align-items: center;
        gap: 3rem;
        padding: 4rem 1rem;
        text-align: center;
      }

      .footer__tagline {
        max-width: 220px;
      }

      .footer__info {
        align-items: center;
        gap: 2rem;
        width: auto;
      }

      .footer__info-item {
        align-items: center;
        text-align: center;
      }

      .footer__info-value {
        text-align: center;
      }
    }

    /* ──────────────────────────────────────────────────── */
    /* PARALLAX PHOTOS                                       */
    /* ──────────────────────────────────────────────────── */
    .parallax-stage {
      position: relative;
      overflow: hidden;
    }

    .parallax-photo {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      border: 10px solid var(--color-border);
      overflow: hidden;
      will-change: transform;
    }

    .parallax-photo picture,
    .parallax-photo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Figma: left:887px top:173px — hero top-right, landscape */
    .photo-1 {
      width: clamp(220px, 30.4vw, 438px);
      aspect-ratio: 438 / 285;
      right: 8%;
      top: 12vh;
    }

    /* Figma: left:103px top:519px — hero left-middle, portrait */
    .photo-2 {
      width: clamp(170px, 22.5vw, 324px);
      aspect-ratio: 324 / 375;
      left: 7%;
      top: 37vh;
    }

    /* Figma: left:56px top:2557px — menu lower-left, landscape */
    .photo-3 {
      width: clamp(150px, 22.5vw, 324px);
      aspect-ratio: 324 / 210;
      left: 4%;
      top: 178vh;
    }

    /* 4th photo — menu right side, balances photo-3 */
    .photo-4 {
      width: clamp(150px, 19vw, 280px);
      aspect-ratio: 4 / 3;
      right: 5%;
      top: 120vh;
    }

    @media (max-width: 767px) {
      .parallax-photo { display: none; }
    }

    /* ──────────────────────────────────────────────────── */
    /* REDUCED MOTION                                        */
    /* ──────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
      .reveal { opacity: 1; transform: none; }
      .parallax-photo { will-change: auto; }
    }
  </style>
</head>

<body>

  <div class="parallax-stage">

    <main id="main">

      <!-- ── HERO ───────────────────────────────────────── -->
      <section class="hero" aria-label="Hero">
        <img
          src="TheBean-Symbol-OnLight.svg"
          class="hero__symbol reveal"
          alt=""
          aria-hidden="true"
        >
        <img
          src="TheBean-Wordmark-OnLight.svg"
          class="hero__wordmark reveal"
          alt="The Bean Espresso Bar"
        >
        <p class="hero__sub reveal"><em>Italian ritual</em> meets Wilton Manors heart</p>
      </section>

      <!-- ── MENU ───────────────────────────────────────── -->
      <section class="menu-section" id="menu" aria-label="Menu">
        <div class="menu-heading reveal">MENU</div>
        <div class="menu-item reveal">ESPRESSO</div>
        <div class="menu-item reveal">DOPPIO</div>
        <div class="menu-item reveal">MACCHIATO</div>
        <div class="menu-item reveal">CAPPUCCINO</div>
        <div class="menu-item reveal">LATTE</div>
        <div class="menu-item reveal">AMERICANO</div>
        <div class="menu-item reveal">COFFEE</div>
        <div class="menu-item reveal">AFFAGATO</div>
      </section>

    </main>

    <!-- ── PARALLAX PHOTOS ────────────────────────────── -->
    <!-- speed = fraction of scrollY applied as translateY(down).
         Lower speed → photo moves up faster on screen (exits sooner).
         Upper photos get lower speeds so they clear before lower ones arrive. -->

    <div class="parallax-photo photo-1" data-speed="0.15" aria-hidden="true">
      <picture>
        <source srcset="photos/espresso-pastries-window.webp" type="image/webp">
        <img src="photos/espresso-pastries-window.jpg" alt="">
      </picture>
    </div>

    <div class="parallax-photo photo-2" data-speed="0.38" aria-hidden="true">
      <picture>
        <source srcset="photos/iced-latte-plants.webp" type="image/webp">
        <img src="photos/iced-latte-plants.jpg" alt="">
      </picture>
    </div>

    <div class="parallax-photo photo-4" data-speed="0.52" aria-hidden="true">
      <picture>
        <source srcset="photos/iced-latte-logo.webp" type="image/webp">
        <img src="photos/iced-latte-logo.jpg" alt="">
      </picture>
    </div>

    <div class="parallax-photo photo-3" data-speed="0.67" aria-hidden="true">
      <picture>
        <source srcset="photos/lifestyle-table-flatlay.webp" type="image/webp">
        <img src="photos/lifestyle-table-flatlay.jpg" alt="">
      </picture>
    </div>

  </div>

  <!-- ── FOOTER ─────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    <img
      src="TheBean-Complete-OnDark.svg"
      class="footer__logo"
      alt="The Bean Espresso Bar"
    >
    <div class="footer__info">
      <div class="footer__info-item">
        <p class="footer__info-label">Location</p>
        <address class="footer__info-value" style="font-style:italic;">
          2151 Wilton Drive<br>
          Wilton Manors, FL
        </address>
      </div>
      <div class="footer__info-item">
        <p class="footer__info-label">Hours</p>
        <p class="footer__info-value">
          Mon–Fri &nbsp; 7am–9pm<br>
          Sat–Sun &nbsp; 8am–8pm
        </p>
      </div>
      <div class="footer__info-item">
        <p class="footer__info-label">Instagram</p>
        <p class="footer__info-value">
          <a
            href="https://www.instagram.com/thebeanespressobar"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="The Bean Espresso Bar on Instagram"
          >@thebeanespressobar</a>
        </p>
      </div>
    </div>
  </footer>

  <script>
    // ── SCROLL REVEAL ─────────────────────────────────────
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    } else {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
    }

    // ── PARALLAX ──────────────────────────────────────────
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const parallaxPhotos = Array.from(document.querySelectorAll('.parallax-photo'));

    if (!prefersReducedMotion && parallaxPhotos.length) {
      let ticking = false;

      function updateParallax() {
        const scrollY = window.scrollY;
        parallaxPhotos.forEach(photo => {
          const speed = parseFloat(photo.dataset.speed) || 0.65;
          photo.style.transform = 'translateY(' + (scrollY * speed) + 'px)';
        });
        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(updateParallax);
          ticking = true;
        }
      }, { passive: true });
    }
  </script>

</body>
</html>
