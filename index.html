<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Specialty espresso bar in Wilton Manors, FL. Italian heritage, South Florida soul.">
  <title>The Bean Espresso Bar — Wilton Manors, FL</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700&family=Bona+Nova+SC:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/thin/style.css">

  <style>
    /* ─── RESET ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ─── TOKENS ───────────────────────────────────────── */
    :root {
      --color-bg:        #E7D1C9;
      --color-surface:   #FFF9F7;
      --color-text:      #241F1E;
      --color-footer-bg: #181514;
      --color-footer-fg: #E7D1C9;
      --color-accent:    #C29E90;
      --color-border:    #241F1E;

      --font-display: 'Hanken Grotesk', sans-serif;
      --font-heritage: 'Bona Nova SC', serif;

      --grid-max:    1160px;
      --grid-gutter: clamp(1.5rem, 5vw, 4rem);
    }

    /* ─── BASE ─────────────────────────────────────────── */
    html { scroll-behavior: smooth; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-heritage);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── CONTAINER ────────────────────────────────────── */
    .container {
      max-width: var(--grid-max);
      margin-inline: auto;
      padding-inline: var(--grid-gutter);
    }

    /* ─── FOCUS ────────────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ─── SCROLL REVEAL ────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease-out, transform 0.7s ease-out;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ──────────────────────────────────────────────────── */
    /* HERO                                                  */
    /* ──────────────────────────────────────────────────── */
    .hero {
      min-height: 100svh;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(4rem, 10vw, 8rem) var(--grid-gutter);
      gap: clamp(1.5rem, 3vw, 2.5rem);
      text-align: center;
    }

    .hero__symbol {
      width: clamp(140px, 22vw, 280px);
      height: auto;
    }

    .hero__wordmark {
      width: clamp(220px, 36vw, 460px);
      height: auto;
    }

    .hero__sub {
      font-family: var(--font-heritage);
      font-size: clamp(1.6rem, 3.5vw, 3.25rem);
      font-weight: 400;
      font-style: normal;
      color: var(--color-text);
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-top: clamp(1rem, 3vw, 2rem);
    }

    .hero__sub em {
      font-style: italic;
    }

    /* ──────────────────────────────────────────────────── */
    /* MENU SECTION                                          */
    /* ──────────────────────────────────────────────────── */
    .menu-section {
      background: var(--color-surface);
      padding: clamp(4rem, 8vw, 6rem) clamp(1rem, 3vw, 2rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.5rem, 3vw, 2.5rem);
    }

    .menu-heading {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.75rem, 4vw, 3.5rem);
      letter-spacing: -0.01em;
      color: var(--color-text);
      text-align: center;
      border-bottom: 10px solid var(--color-border);
      width: 100%;
      padding-bottom: clamp(1rem, 2vw, 1.5rem);
      line-height: 1;
    }

    .menu-item {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 5rem);
      letter-spacing: 0.2em;
      color: var(--color-text);
      text-align: center;
      border-bottom: 10px solid var(--color-border);
      width: 100%;
      padding-block: clamp(0.75rem, 1.5vw, 1.25rem);
      line-height: 1;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    /* ──────────────────────────────────────────────────── */
    /* FIND US                                               */
    /* ──────────────────────────────────────────────────── */
    .find-us {
      background: var(--color-bg);
      padding: clamp(4rem, 8vw, 7rem) var(--grid-gutter);
    }

    .find-us__grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: clamp(3rem, 6vw, 5rem);
    }

    .find-us__label {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-text);
      margin-bottom: 0.75rem;
    }

    .find-us__value {
      font-family: var(--font-heritage);
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 400;
      color: var(--color-text);
      line-height: 1.7;
    }

    .find-us__item {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }

    .find-us__item i {
      font-size: 1.25rem;
      color: var(--color-text);
      margin-top: 2px;
      flex-shrink: 0;
    }

    .find-us__social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-heritage);
      font-style: italic;
      font-size: clamp(1rem, 2vw, 1.25rem);
      color: var(--color-text);
      transition: opacity 0.15s ease-out;
    }

    .find-us__social-link:hover { opacity: 0.65; }

    /* ──────────────────────────────────────────────────── */
    /* FOOTER                                                */
    /* ──────────────────────────────────────────────────── */
    .footer {
      background: var(--color-footer-bg);
      color: var(--color-footer-fg);
      min-height: clamp(340px, 50vw, 600px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(2rem, 5vw, 4.5rem);
      padding: clamp(3rem, 6vw, 5rem) clamp(1.5rem, 5vw, 4rem);
      flex-wrap: wrap;
    }

    .footer__tagline {
      font-family: var(--font-heritage);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(0.95rem, 1.5vw, 1.5rem);
      letter-spacing: -0.04em;
      text-align: center;
      line-height: 1.25;
      color: var(--color-footer-fg);
      max-width: 160px;
    }

    .footer__logo {
      width: clamp(180px, 28vw, 340px);
      height: auto;
      flex-shrink: 0;
    }

    .footer__copyright {
      display: none; /* hidden — handled by Instagram handle */
    }

    /* ──────────────────────────────────────────────────── */
    /* RESPONSIVE                                            */
    /* ──────────────────────────────────────────────────── */
    @media (min-width: 900px) {
      .find-us__grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 599px) {
      .footer {
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
      }

      .footer__tagline {
        max-width: 220px;
      }
    }

    /* ──────────────────────────────────────────────────── */
    /* REDUCED MOTION                                        */
    /* ──────────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
</head>

<body>

  <main id="main">

    <!-- ── HERO ───────────────────────────────────────── -->
    <section class="hero" aria-label="Hero">
      <img
        src="TheBean-Symbol-OnLight.svg"
        class="hero__symbol reveal"
        alt=""
        aria-hidden="true"
      >
      <img
        src="TheBean-Wordmark-OnLight.svg"
        class="hero__wordmark reveal"
        alt="The Bean Espresso Bar"
      >
      <p class="hero__sub reveal">
        <em>Italian ritual</em> meets<br>
        Wilton Manors heart
      </p>
    </section>

    <!-- ── MENU ───────────────────────────────────────── -->
    <section class="menu-section" id="menu" aria-label="Menu">
      <div class="menu-heading reveal">MENU</div>
      <div class="menu-item reveal">ESPRESSO</div>
      <div class="menu-item reveal">DOPPIO</div>
      <div class="menu-item reveal">MACCHIATO</div>
      <div class="menu-item reveal">CAPPUCCINO</div>
      <div class="menu-item reveal">LATTE</div>
      <div class="menu-item reveal">AMERICANO</div>
      <div class="menu-item reveal">COFFEE</div>
      <div class="menu-item reveal">AFFAGATO</div>
    </section>

    <!-- ── FIND US ─────────────────────────────────────── -->
    <section class="find-us" id="find-us" aria-label="Find Us">
      <div class="container">
        <div class="find-us__grid">

          <div class="reveal">
            <div class="find-us__item">
              <i class="ph-thin ph-map-pin" aria-hidden="true"></i>
              <div>
                <p class="find-us__label">Location</p>
                <address class="find-us__value" style="font-style:normal;">
                  2151 Wilton Drive<br>
                  Wilton Manors, FL
                </address>
              </div>
            </div>
          </div>

          <div class="reveal">
            <div class="find-us__item">
              <i class="ph-thin ph-clock" aria-hidden="true"></i>
              <div>
                <p class="find-us__label">Hours</p>
                <p class="find-us__value">
                  Mon–Fri &nbsp; 7am–9pm<br>
                  Sat–Sun &nbsp; 8am–8pm
                </p>
              </div>
            </div>
          </div>

          <div class="reveal">
            <div class="find-us__item">
              <i class="ph-thin ph-instagram-logo" aria-hidden="true"></i>
              <div>
                <p class="find-us__label">Instagram</p>
                <a
                  class="find-us__social-link"
                  href="https://www.instagram.com/thebeanespressobar"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="The Bean Espresso Bar on Instagram"
                >
                  @thebeanespressobar
                </a>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>

  </main>

  <!-- ── FOOTER ─────────────────────────────────────── -->
  <footer class="footer" role="contentinfo">
    <p class="footer__tagline">made with love, in sunny Wilton Manors</p>
    <img
      src="TheBean-Logo-OnDark.svg"
      class="footer__logo"
      alt="The Bean Espresso Bar"
    >
    <p class="footer__tagline">
      <a
        href="https://www.instagram.com/thebeanespressobar"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="The Bean on Instagram"
        style="color:inherit;"
      >@TheBeanEspressoBar</a>
    </p>
  </footer>

  <script>
    // ── SCROLL REVEAL ─────────────────────────────────────
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    } else {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
    }
  </script>

</body>
</html>
